name: junkideas-dev

services:
  website:
    image: junkideas:dev
    build:
      context: .
      dockerfile: Dockerfile.dev
    init: true
    user: "1000:1000"
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next-cache:/app/.next
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 200
    mem_limit: 1g
    cpus: 1.00
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

volumes:
  node_modules:
  next-cache:
